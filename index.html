      color: #000000;
      font-family: sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 40px auto;
      display: block;
      width: fit-content;
    }
    .book-btn:hover {
      background: #e5e5e5;
    }
  </style>
</head>

    class="book-btn"
    data-cal-link="builtbykai/15min"
    data-cal-namespace="15min"

</body>
</html>
